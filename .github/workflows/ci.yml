# CI — lint e TypeScript (para branch protection no GitHub)
name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
